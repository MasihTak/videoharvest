name: Release

on:
  push:
    branches: [main]

jobs:
  release-please:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    # Two rapid pushes to main must not update the release PR concurrently
    concurrency:
      group: release-please
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      sha: ${{ steps.release.outputs.sha }}
      release_id: ${{ steps.release_id.outputs.id }}
    steps:
      - uses: googleapis/release-please-action@v5
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

      # Must live in this job, not a PR-triggered workflow: release-please pushes with
      # GITHUB_TOKEN, and GITHUB_TOKEN pushes never trigger new workflow runs.
      - name: Checkout release PR branch
        if: steps.release.outputs.prs_created == 'true'
        uses: actions/checkout@v7
        with:
          ref: ${{ fromJSON(steps.release.outputs.pr).headBranchName }}

      - name: Sync Cargo.lock into the release PR
        if: steps.release.outputs.prs_created == 'true'
        run: |
          # -w updates workspace members only, leaving dependency versions untouched
          cargo update -w --manifest-path src-tauri/Cargo.toml
          git config user.name  'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git diff --quiet -- src-tauri/Cargo.lock && exit 0
          git commit -m 'chore: sync Cargo.lock' -- src-tauri/Cargo.lock
          git push

      # Draft releases are invisible to GET /releases/tags/{tag}; list instead.
      - name: Resolve draft release id
        id: release_id
        if: steps.release.outputs.release_created == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.release.outputs.tag_name }}
        run: |
          id=$(gh api "repos/${{ github.repository }}/releases" \
                 --jq ".[] | select(.tag_name==\"$TAG\") | .id")
          echo "id=$id" >> "$GITHUB_OUTPUT"

  build-tauri:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    strategy:
      fail-fast: false
      matrix:
        platform: [windows-latest, ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.platform }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ needs.release-please.outputs.sha }}

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf build-essential

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v7
        with:
          node-version: '24'
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          releaseId: ${{ needs.release-please.outputs.release_id }}
          retryAttempts: 2

  publish:
    needs: [release-please, build-tauri]
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      # Publishing the draft is what creates the git tag. No `if: success()` needed —
      # `needs` already gates this: a failed platform build fails build-tauri and skips
      # this job, leaving the draft in place for manual inspection.
      - name: Publish release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api -X PATCH \
            "repos/${{ github.repository }}/releases/${{ needs.release-please.outputs.release_id }}" \
            -F draft=false
